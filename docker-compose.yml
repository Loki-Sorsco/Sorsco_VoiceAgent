# Dokploy Compose deployment for the browser-call voice agent.
# Set GROQ_API_KEY / SARVAM_API_KEY / DAILY_API_KEY / CLIENT_ID in the
# service's Environment tab.
# In Domains: service "voice-agent", port 7860, HTTPS on.
#
# NOTE on transports: inside Docker's bridge network, SmallWebRTC audio (direct
# UDP) cannot reach the container — browser calls to the deployed server must
# use the Daily transport (select "Daily" in the call page's transport
# dropdown; requires DAILY_API_KEY). SmallWebRTC works for local runs.
services:
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - DAILY_API_KEY=${DAILY_API_KEY}
      - CLIENT_ID=${CLIENT_ID:-hotel_sunrise}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      # Real phone calls (Twilio trial works) — see /admin -> Integrations -> Phone
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - PUBLIC_HOST=${PUBLIC_HOST}
    expose:
      - "7860"
    networks:
      - dokploy-network
    restart: unless-stopped
    volumes:
      # Clients created via /admin survive redeploys.
      - voice-agent-clients:/app/clients
      - voice-agent-data:/app/data

networks:
  dokploy-network:
    external: true

volumes:
  voice-agent-clients:
  voice-agent-data:
