# Dokploy Compose deployment for the browser-call voice agent.
#
# network_mode: host — WebRTC audio needs direct UDP to the process; Docker's
# bridge network blocks it. With host networking the app binds the server's
# real interfaces, so browsers can connect (self-hosted, no TURN service).
#
# NOTE: with host networking, Dokploy's Domains tab can no longer route to
# this container. Routing is done with a manual Traefik dynamic-config file
# (see README "Self-hosted deployment") pointing at http://<server-ip>:7860.
services:
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - CLIENT_ID=${CLIENT_ID:-hotel_sunrise}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
    restart: unless-stopped
